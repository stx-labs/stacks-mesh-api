openapi: 3.0.3
info:
  title: Stacks Mesh API
  description: A Mesh API (formerly Rosetta API) implementation for the Stacks blockchain
  version: 0.2.0
components:
  schemas: {}
paths:
  /network/list:
    post:
      tags:
        - Network
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                metadata:
                  type: object
                  additionalProperties: {}
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - network_identifiers
                properties:
                  network_identifiers:
                    type: array
                    items:
                      type: object
                      required:
                        - blockchain
                        - network
                      properties:
                        blockchain:
                          type: string
                          enum:
                            - stacks
                        network:
                          anyOf:
                            - type: string
                              enum:
                                - mainnet
                            - type: string
                              enum:
                                - testnet
  /network/status:
    post:
      tags:
        - Network
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - network_identifier
              properties:
                network_identifier:
                  type: object
                  required:
                    - blockchain
                    - network
                  properties:
                    blockchain:
                      type: string
                      enum:
                        - stacks
                    network:
                      anyOf:
                        - type: string
                          enum:
                            - mainnet
                        - type: string
                          enum:
                            - testnet
                metadata:
                  type: object
                  additionalProperties: {}
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - current_block_identifier
                  - current_block_timestamp
                  - genesis_block_identifier
                  - peers
                properties:
                  current_block_identifier:
                    type: object
                    required:
                      - index
                      - hash
                    properties:
                      index:
                        type: integer
                      hash:
                        pattern: ^0x[0-9a-fA-F]+$
                        type: string
                  current_block_timestamp:
                    type: number
                  genesis_block_identifier:
                    type: object
                    required:
                      - index
                      - hash
                    properties:
                      index:
                        type: integer
                      hash:
                        pattern: ^0x[0-9a-fA-F]+$
                        type: string
                  oldest_block_identifier:
                    type: object
                    required:
                      - index
                      - hash
                    properties:
                      index:
                        type: integer
                      hash:
                        pattern: ^0x[0-9a-fA-F]+$
                        type: string
                  sync_status:
                    type: object
                    properties:
                      current_index:
                        type: number
                      target_index:
                        type: number
                      stage:
                        type: string
                      synced:
                        type: boolean
                  peers:
                    type: array
                    items:
                      type: object
                      required:
                        - peer_id
                        - metadata
                      properties:
                        peer_id:
                          type: string
                        metadata:
                          type: object
                          required:
                            - ip
                            - port
                            - peer_version
                            - type
                          properties:
                            ip:
                              type: string
                            port:
                              type: number
                            peer_version:
                              type: number
                            type:
                              type: array
                              items:
                                anyOf:
                                  - type: string
                                    enum:
                                      - bootstrap
                                  - type: string
                                    enum:
                                      - sample
                                  - type: string
                                    enum:
                                      - inbound
                                  - type: string
                                    enum:
                                      - outbound
        "500":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                  - retriable
                properties:
                  code:
                    type: number
                  message:
                    type: string
                  description:
                    type: string
                  retriable:
                    type: boolean
                  details:
                    type: object
                    additionalProperties: {}
  /network/options:
    post:
      tags:
        - Network
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - network_identifier
              properties:
                network_identifier:
                  type: object
                  required:
                    - blockchain
                    - network
                  properties:
                    blockchain:
                      type: string
                      enum:
                        - stacks
                    network:
                      anyOf:
                        - type: string
                          enum:
                            - mainnet
                        - type: string
                          enum:
                            - testnet
                metadata:
                  type: object
                  additionalProperties: {}
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - version
                  - allow
                properties:
                  version:
                    type: object
                    required:
                      - rosetta_version
                      - node_version
                    properties:
                      rosetta_version:
                        type: string
                      node_version:
                        type: string
                      middleware_version:
                        type: string
                      metadata:
                        type: object
                        additionalProperties: {}
                  allow:
                    type: object
                    required:
                      - operation_statuses
                      - operation_types
                      - errors
                      - historical_balance_lookup
                      - call_methods
                      - balance_exemptions
                      - mempool_coins
                    properties:
                      operation_statuses:
                        type: array
                        items:
                          type: object
                          required:
                            - status
                            - successful
                          properties:
                            status:
                              anyOf:
                                - type: string
                                  enum:
                                    - pending
                                - type: string
                                  enum:
                                    - success
                                - type: string
                                  enum:
                                    - abort_by_response
                                - type: string
                                  enum:
                                    - abort_by_post_condition
                                - type: string
                                  enum:
                                    - dropped_replace_by_fee
                                - type: string
                                  enum:
                                    - dropped_replace_across_fork
                                - type: string
                                  enum:
                                    - dropped_too_expensive
                                - type: string
                                  enum:
                                    - dropped_problematic
                                - type: string
                                  enum:
                                    - dropped_stale_garbage_collect
                            successful:
                              type: boolean
                      operation_types:
                        type: array
                        items:
                          type: string
                      errors:
                        type: array
                        items:
                          type: object
                          required:
                            - code
                            - message
                            - retriable
                          properties:
                            code:
                              type: number
                            message:
                              type: string
                            description:
                              type: string
                            retriable:
                              type: boolean
                            details:
                              type: object
                              additionalProperties: {}
                      historical_balance_lookup:
                        type: boolean
                      timestamp_start_index:
                        type: number
                      call_methods:
                        type: array
                        items:
                          type: string
                      balance_exemptions:
                        type: array
                        items:
                          type: object
                          properties:
                            sub_account_address:
                              type: string
                            currency:
                              type: object
                              required:
                                - symbol
                                - decimals
                              properties:
                                symbol:
                                  type: string
                                decimals:
                                  type: integer
                                metadata:
                                  type: object
                                  required:
                                    - asset_identifier
                                    - token_type
                                  properties:
                                    asset_identifier:
                                      anyOf:
                                        - type: string
                                        - type: "null"
                                    name:
                                      type: string
                                    value:
                                      type: string
                                    token_type:
                                      anyOf:
                                        - type: string
                                          enum:
                                            - ft
                                        - type: string
                                          enum:
                                            - nft
                            exemption_type:
                              anyOf:
                                - type: string
                                  enum:
                                    - greater_or_equal
                                - type: string
                                  enum:
                                    - less_or_equal
                                - type: string
                                  enum:
                                    - dynamic
                      mempool_coins:
                        type: boolean
                      block_hash_case:
                        anyOf:
                          - type: string
                            enum:
                              - upper_case
                          - type: string
                            enum:
                              - lower_case
                          - type: string
                            enum:
                              - case_sensitive
                          - type: string
                            enum:
                              - "null"
                      transaction_hash_case:
                        anyOf:
                          - type: string
                            enum:
                              - upper_case
                          - type: string
                            enum:
                              - lower_case
                          - type: string
                            enum:
                              - case_sensitive
                          - type: string
                            enum:
                              - "null"
        "500":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                  - retriable
                properties:
                  code:
                    type: number
                  message:
                    type: string
                  description:
                    type: string
                  retriable:
                    type: boolean
                  details:
                    type: object
                    additionalProperties: {}
  /block:
    post:
      tags:
        - Block
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - network_identifier
                - block_identifier
              properties:
                network_identifier:
                  type: object
                  required:
                    - blockchain
                    - network
                  properties:
                    blockchain:
                      type: string
                      enum:
                        - stacks
                    network:
                      anyOf:
                        - type: string
                          enum:
                            - mainnet
                        - type: string
                          enum:
                            - testnet
                block_identifier:
                  type: object
                  properties:
                    index:
                      type: integer
                    hash:
                      pattern: ^0x[0-9a-fA-F]+$
                      type: string
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  block:
                    type: object
                    required:
                      - block_identifier
                      - parent_block_identifier
                      - timestamp
                      - transactions
                    properties:
                      block_identifier:
                        type: object
                        required:
                          - index
                          - hash
                        properties:
                          index:
                            type: integer
                          hash:
                            pattern: ^0x[0-9a-fA-F]+$
                            type: string
                      parent_block_identifier:
                        type: object
                        required:
                          - index
                          - hash
                        properties:
                          index:
                            type: integer
                          hash:
                            pattern: ^0x[0-9a-fA-F]+$
                            type: string
                      timestamp:
                        type: integer
                      transactions:
                        type: array
                        items:
                          type: object
                          required:
                            - transaction_identifier
                            - operations
                            - metadata
                          properties:
                            transaction_identifier:
                              type: object
                              required:
                                - hash
                              properties:
                                hash:
