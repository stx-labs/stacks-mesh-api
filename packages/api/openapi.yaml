openapi: 3.0.3
info:
  title: Stacks Mesh API
  description: A Mesh API (formerly Rosetta API) implementation for the Stacks blockchain
  version: 0.7.4
components:
  schemas: {}
paths:
  /network/list:
    post:
      tags:
        - Network
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                metadata:
                  type: object
                  additionalProperties: {}
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - network_identifiers
                properties:
                  network_identifiers:
                    type: array
                    items:
                      type: object
                      required:
                        - blockchain
                        - network
                      properties:
                        blockchain:
                          type: string
                          enum:
                            - stacks
                        network:
                          anyOf:
                            - type: string
                              enum:
                                - mainnet
                            - type: string
                              enum:
                                - testnet
  /network/options:
    post:
      tags:
        - Network
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - network_identifier
              properties:
                network_identifier:
                  type: object
                  required:
                    - blockchain
                    - network
                  properties:
                    blockchain:
                      type: string
                      enum:
                        - stacks
                    network:
                      anyOf:
                        - type: string
                          enum:
                            - mainnet
                        - type: string
                          enum:
                            - testnet
                metadata:
                  type: object
                  additionalProperties: {}
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - version
                  - allow
                properties:
                  version:
                    type: object
                    required:
                      - rosetta_version
                      - node_version
                    properties:
                      rosetta_version:
                        type: string
                      node_version:
                        type: string
                      middleware_version:
                        type: string
                      metadata:
                        type: object
                        additionalProperties: {}
                  allow:
                    type: object
                    required:
                      - operation_statuses
                      - operation_types
                      - errors
                      - historical_balance_lookup
                      - call_methods
                      - balance_exemptions
                      - mempool_coins
                    properties:
                      operation_statuses:
                        type: array
                        items:
                          type: object
                          required:
                            - status
                            - successful
                          properties:
                            status:
                              anyOf:
                                - type: string
                                  enum:
                                    - pending
                                - type: string
                                  enum:
                                    - success
                                - type: string
                                  enum:
                                    - abort_by_response
                                - type: string
                                  enum:
                                    - abort_by_post_condition
                                - type: string
                                  enum:
                                    - dropped_replace_by_fee
                                - type: string
                                  enum:
                                    - dropped_replace_across_fork
                                - type: string
                                  enum:
                                    - dropped_too_expensive
                                - type: string
                                  enum:
                                    - dropped_problematic
                                - type: string
                                  enum:
                                    - dropped_stale_garbage_collect
                            successful:
                              type: boolean
                      operation_types:
                        type: array
                        items:
                          type: string
                      errors:
                        type: array
                        items:
                          type: object
                          required:
                            - code
                            - message
                            - retriable
                          properties:
                            code:
                              type: number
                            message:
                              type: string
                            description:
                              type: string
                            retriable:
                              type: boolean
                            details:
                              type: object
                              additionalProperties: {}
                      historical_balance_lookup:
                        type: boolean
                      timestamp_start_index:
                        type: number
                      call_methods:
                        type: array
                        items:
                          type: string
                      balance_exemptions:
                        type: array
                        items:
                          type: object
                          properties:
                            sub_account_address:
                              type: string
                            currency:
                              type: object
                              required:
                                - symbol
                                - decimals
                              properties:
                                symbol:
                                  type: string
                                decimals:
                                  type: integer
                                metadata:
                                  type: object
                                  required:
                                    - asset_identifier
                                    - token_type
                                  properties:
                                    asset_identifier:
                                      anyOf:
                                        - type: string
                                        - type: "null"
                                    name:
                                      type: string
                                    value:
                                      type: string
                                    token_type:
                                      anyOf:
                                        - type: string
                                          enum:
                                            - ft
                                        - type: string
                                          enum:
                                            - nft
                            exemption_type:
                              anyOf:
                                - type: string
                                  enum:
                                    - greater_or_equal
                                - type: string
                                  enum:
                                    - less_or_equal
                                - type: string
                                  enum:
                                    - dynamic
                      mempool_coins:
                        type: boolean
                      block_hash_case:
                        anyOf:
                          - type: string
                            enum:
                              - upper_case
                          - type: string
                            enum:
                              - lower_case
                          - type: string
                            enum:
                              - case_sensitive
                          - type: string
                            enum:
                              - "null"
                      transaction_hash_case:
                        anyOf:
                          - type: string
                            enum:
                              - upper_case
                          - type: string
                            enum:
                              - lower_case
                          - type: string
                            enum:
                              - case_sensitive
                          - type: string
                            enum:
                              - "null"
        "500":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                  - retriable
                properties:
                  code:
                    type: number
                  message:
                    type: string
                  description:
                    type: string
                  retriable:
                    type: boolean
                  details:
                    type: object
                    additionalProperties: {}
  /construction/derive:
    post:
      tags:
        - Construction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - network_identifier
                - public_key
              properties:
                network_identifier:
                  type: object
                  required:
                    - blockchain
                    - network
                  properties:
                    blockchain:
                      type: string
                      enum:
                        - stacks
                    network:
                      anyOf:
                        - type: string
                          enum:
                            - mainnet
                        - type: string
                          enum:
                            - testnet
                public_key:
                  type: object
                  required:
                    - hex_bytes
                    - curve_type
                  properties:
                    hex_bytes:
                      pattern: ^(0x)?[0-9a-fA-F]+$
                      type: string
                    curve_type:
                      type: string
                      enum:
                        - secp256k1
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  address:
                    type: string
                  account_identifier:
                    type: object
                    required:
                      - address
                    properties:
                      address:
                        anyOf:
                          - pattern: ^[0123456789ABCDEFGHJKMNPQRSTVWXYZ]{28,41}\.[a-zA-Z]([a-zA-Z0-9]|[-_]){0,39}$
                            type: string
                          - pattern: ^[0123456789ABCDEFGHJKMNPQRSTVWXYZ]{28,41}$
                            type: string
                      sub_account:
                        type: object
                        required:
                          - address
                        properties:
                          address:
                            type: string
                          metadata:
                            type: object
                            additionalProperties: {}
        "500":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                  - retriable
                properties:
                  code:
                    type: number
                  message:
                    type: string
                  description:
                    type: string
                  retriable:
                    type: boolean
                  details:
                    type: object
                    additionalProperties: {}
