    post:
      tags:
        - Construction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - network_identifier
                - signed_transaction
              properties:
                network_identifier:
                  type: object
                  required:
                    - blockchain
                    - network
                  properties:
                    blockchain:
                      type: string
                      enum:
                        - stacks
                    network:
                      anyOf:
                        - type: string
                          enum:
                            - mainnet
                        - type: string
                          enum:
                            - testnet
                signed_transaction:
